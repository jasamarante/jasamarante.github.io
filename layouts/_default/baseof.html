<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
    {{- partial "head.html" . }}
        <style>
        a {
            color: #0066cc;
            text-decoration: underline;
            font-weight: 500;
        }
        a:hover {
            color: #0052a3;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    {{- partial "header.html" . }}
    <main style="max-width: 1100px; margin: 0 auto; padding: 0 50px;">
        {{- block "main" . }}{{- end }}
    </main>
    {{- partial "footer.html" . }}
</body>
</html>
